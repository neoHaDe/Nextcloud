global:
  scrape_interval: 15s 

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090'] # Мониторинг самого Prometheus

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100'] # Мониторинг хоста

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'process-exporter'
    static_configs:
      - targets: ['process-exporter:9256']
      
  - job_name: 'windows_exporter'
    static_configs:
      - targets: ['host.docker.internal:9182']