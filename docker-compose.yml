
services:
  # База данных
  db:
    image: mariadb:10.11
    container_name: nextcloud_db
    restart: always
    command: --transaction-isolation=READ-COMMITTED --log-bin=off --skip-innodb-read-only-compressed
    volumes:
      - db_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: этоМОЙпарольВамненадо
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: этотожененужно

  # Nextclouf
  nextcloud:
    image: nextcloud:latest
    container_name: nextcloud_app
    restart: always
    ports:
      - "8080:80"   
    entrypoint:  
      /bin/sh -c "
        apt-get update &&
        apt-get install -y cron &&
        echo '*/5 * * * * php -f /var/www/html/cron.php' | crontab -u www-data - &&
        cron &&
        chmod -R 777 /mnt/nas &&
        exec /entrypoint.sh apache2-foreground
     "
    volumes:
      - F:/NextcloudData:/var/www/html/data  # монтаж диска, типа для NAS
      - F:/SharedNAS:/mnt/nas 
      - nextcloud_config:/var/www/html/config
      - nextcloud_apps:/var/www/html/custom_apps
      - tmp_volume:/tmp
    
    environment:
      NEXTCLOUD_TRUSTED_DOMAINS: "nas.nehade.xyz localhost 127.0.0.1"
      MYSQL_HOST: db
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: этотожененужно
      PHP_PM_MAX_CHILDREN: 20
      PHP_PM_START_SERVERS: 5
      EXIFTOOL_NO_EXEC: 1
    depends_on:
      - db

  # Nginx Proxy Manager 
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx_pm
    restart: always
    ports:
      - "80:80"     # HTTP
      - "81:81"     # Админка NPM
      - "443:443"   # HTTPS
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt

volumes:
  db_data:
  nextcloud_config:
  nextcloud_apps:
  npm_data:
  npm_letsencrypt:
  tmp_volume: